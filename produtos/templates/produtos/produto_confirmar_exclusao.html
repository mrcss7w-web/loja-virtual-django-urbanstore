{% extends 'core/base.html' %}
{% block title %}Excluir Produto{% endblock %}
{% block content %}
<section class="admin-section">
    <div class="section-inner">
        <div class="confirm-card">
            <div class="confirm-icon">⚠️</div>
            <h2 class="confirm-title">Excluir Produto</h2>
            <p class="confirm-sub">Tem certeza que deseja excluir <strong>"{{ produto.nome }}"</strong>?<br>Esta ação não pode ser desfeita.</p>
            <div class="confirm-actions">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn-danger">Sim, excluir</button>
                </form>
                <a href="{% url 'produtos:admin_lista' %}" class="btn-outline">Cancelar</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
